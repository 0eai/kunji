<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kunji self-hosted demo</title>
    <style>
      :root {
        --paper: #faf9f6;
        --ink: #1a1a18;
        --muted: #6b6b66;
        --line: #e7e5e0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100dvh; background: var(--paper); color: var(--ink);
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        display: flex; align-items: center; justify-content: center; padding: 24px;
      }
      main { width: 100%; max-width: 26rem; }
      h1 { font-size: 2rem; letter-spacing: -0.02em; margin: 0 0 4px; }
      p.sub { color: var(--muted); margin: 0 0 28px; }
      .who { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
      .who img { width: 48px; height: 48px; border-radius: 12px; border: 1px solid var(--line); object-fit: cover; }
      .who b { font-size: 15px; }
      .who small { display: block; color: var(--muted); font-size: 12px; }
      code { display: block; font-family: ui-monospace, Menlo, monospace; font-size: 12px;
        word-break: break-all; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
        padding: 14px 0; margin-bottom: 8px; }
      .note { font-size: 12px; color: var(--muted); line-height: 1.5; }
      button.link { background: none; border: 0; color: var(--muted); font: inherit; font-size: 14px;
        cursor: pointer; padding: 8px 0; }
      button.link:hover { color: var(--ink); }
      [hidden] { display: none !important; }
    </style>
  </head>
  <body>
    <main>
      <section id="out">
        <img src="https://kunji.cc/icon.svg" alt="kunji" width="44" height="44" style="margin-bottom: 14px" />
        <h1>kunji self-hosted demo</h1>
        <p class="sub">Your Firebase front door · your dynamic-IP box does the work.</p>
        <div id="kbtn"></div>
        <p class="note" id="hint" style="margin-top: 16px"></p>
      </section>

      <section id="in" hidden>
        <h1>Signed in</h1>
        <p class="sub">Authenticated with a Firebase custom token (uid = your kunji sub).</p>
        <div class="who">
          <img id="avatar" alt="" />
          <span>
            <b id="name"></b>
            <small id="origin"></small>
          </span>
        </div>
        <p class="note" style="margin-bottom: 6px">Your account (Firestore <code style="display:inline;border:0;padding:0">users/{sub}</code>)</p>
        <code id="acct"></code>
        <button class="link" id="logout">Sign out</button>
      </section>
    </main>

    <!-- Firebase compat SDK + auto-config (served by Firebase Hosting at /__/firebase/init.js).
         Bump the version if needed; init.js injects this project's config — no hardcoded keys. -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    <script src="/__/firebase/init.js"></script>
    <script src="https://kunji.cc/rp.js"></script>
    <script>
      const $ = (id) => document.getElementById(id);
      const auth = firebase.auth();
      const db = firebase.firestore();

      // Render the official button. callbackUrl is absolute (the wallet POSTs to it);
      // everything is same-origin on your Hosting/custom domain → audience = that domain.
      kunji.render($('kbtn'), {
        appName: 'kunji Self-Hosted Demo',
        audience: location.hostname,
        sessionUrl: '/api/session',
        callbackUrl: location.origin + '/kunji/callback',
        pollUrl: '/kunji/status',
        scope: 'profile',
      });
      $('hint').textContent = 'Scan with the kunji app — no password, no account to create.';

      function renderAccount(user, sub, claims) {
        // Prefer the consented custom profile; else the default identity from `sub`.
        const def = kunji.handle(sub);
        $('name').textContent = (claims && claims.name) || def.name;
        $('avatar').src = (claims && claims.picture) || def.avatarDataUri;
        $('origin').textContent =
          claims && (claims.name || claims.picture) ? 'from their kunji profile' : 'default identity';
        $('acct').textContent = JSON.stringify(user || { sub }, null, 2);
        $('out').hidden = true;
        $('in').hidden = false;
      }

      async function showSignedIn(sub, claims) {
        // request.auth.uid === sub, so this read is allowed by the security rules.
        const snap = await db.collection('users').doc(sub).get();
        renderAccount(snap.exists ? snap.data() : null, sub, claims);
      }

      // Returning visit: the custom-token session persists, so restore it.
      auth.onAuthStateChanged((u) => {
        if (u && $('in').hidden) showSignedIn(u.uid, null).catch(() => {});
      });

      document.addEventListener('kunji:success', async (e) => {
        const { sub, claims, customToken } = e.detail;
        if (!customToken) {
          $('hint').textContent = 'Signed in, but no token returned — check the callback Function.';
          return;
        }
        await auth.signInWithCustomToken(customToken); // uid === sub
        await showSignedIn(sub, claims);
      });

      $('logout').onclick = async () => {
        await auth.signOut();
        $('in').hidden = true;
        $('out').hidden = false;
      };
    </script>
  </body>
</html>
