<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kunji relay demo</title>
    <style>
      :root {
        --paper: #faf9f6;
        --ink: #1a1a18;
        --muted: #6b6b66;
        --line: #e7e5e0;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        background: var(--paper);
        color: var(--ink);
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      main {
        width: 100%;
        max-width: 26rem;
      }
      h1 {
        font-size: 2rem;
        letter-spacing: -0.02em;
        margin: 0 0 4px;
      }
      p.sub {
        color: var(--muted);
        margin: 0 0 28px;
      }
      .who {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 24px;
      }
      .who img {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        border: 1px solid var(--line);
        object-fit: cover;
      }
      .who b {
        font-size: 15px;
      }
      .who small {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }
      code {
        display: block;
        font-family: ui-monospace, Menlo, monospace;
        font-size: 12px;
        word-break: break-all;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        padding: 14px 0;
        margin-bottom: 8px;
      }
      .note {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.5;
      }
      button.link {
        background: none;
        border: 0;
        color: var(--muted);
        font: inherit;
        font-size: 14px;
        cursor: pointer;
        padding: 8px 0;
      }
      button.link:hover {
        color: var(--ink);
      }
      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main>
      <section id="out">
        <img src="https://kunji.cc/icon.svg" alt="kunji" width="44" height="44" style="margin-bottom: 14px" />
        <h1>kunji relay demo</h1>
        <p class="sub">Local server, no tunnel — the phone meets us at Firebase.</p>
        <div id="kbtn"></div>
        <p class="note" id="hint" style="margin-top: 16px"></p>
      </section>

      <section id="in" hidden>
        <h1>Signed in</h1>
        <p class="sub">Verified at the edge, relayed to your local server.</p>
        <div class="who">
          <img id="avatar" alt="" />
          <span>
            <b id="name"></b>
            <small id="origin"></small>
          </span>
        </div>
        <p class="note" style="margin-bottom: 6px">Your ID for this app</p>
        <code id="sub"></code>
        <button class="link" id="logout">Sign out</button>
      </section>
    </main>

    <script src="https://kunji.cc/rp.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
